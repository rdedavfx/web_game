<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 針對手機瀏覽器的優化，防止縮放並強制填滿 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL Player | Taifer_WebClick</title>
    
    <style>
      /* 移除預設邊距，並讓 html/body 填滿 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #231F20; /* 設定背景色，避免載入時閃白 */
      }

      /* 讓容器與畫布自適應全螢幕 */
      #unityContainer {
        width: 100vw !important;
        height: 100vh !important;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 確保畫布內容比例正確 */
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
    </style>

    <script src="Build/UnityLoader.js"></script>
    <script>
      // 移除相容性警告，強制在手機瀏覽器開啟
      UnityLoader.compatibilityCheck = function(e, t, r) { t(); };
      
      // 實例化 Unity
      var unityInstance = UnityLoader.instantiate("unityContainer", "Build/Test_260507.json");
    </script>
  </head>
  <body>
    <div id="unityContainer"></div>
  </body>
</html>
